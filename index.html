<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sfera — Мессенджер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080f;--bg2:#0e0e1a;--bg3:#161625;--bg4:#1e1e32;--bg5:#252540;
  --a:#6C5CE7;--a2:#a29bfe;--a3:rgba(108,92,231,0.15);--a4:rgba(108,92,231,0.08);
  --gr:#00d2d3;--gr2:rgba(0,210,211,0.15);
  --tx:#f0f0f8;--tx2:#8888aa;--tx3:#555570;--tx4:#3a3a55;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.1);
  --red:#ff6b6b;--red2:rgba(255,107,107,0.15);
  --green:#51cf66;--green2:rgba(81,207,102,0.15);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.5);
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  --transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit;outline:none}
button{cursor:pointer}

/* AUTH SCREENS */
.auth{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,0.08) 0%,transparent 60%)}
.auth-box{width:100%;max-width:420px;background:rgba(14,14,26,0.8);backdrop-filter:blur(20px);border-radius:24px;padding:44px 36px;border:1px solid var(--bd2);box-shadow:var(--shadow-lg)}
.auth-logo{font-size:32px;font-weight:800;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--a),var(--a2),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.auth-sub{text-align:center;color:var(--tx2);font-size:14px;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.field input{width:100%;padding:14px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--radius-sm);color:#fff;font-size:14px;transition:var(--transition)}
.field input:hover{border-color:var(--bd2)}
.field input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a3)}
.field input::placeholder{color:var(--tx4)}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--a),#7c6cf0);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:700;transition:var(--transition);margin-top:8px;position:relative;overflow:hidden}
.auth-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.1));opacity:0;transition:var(--transition)}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,92,231,0.4)}
.auth-btn:hover::before{opacity:1}
.auth-btn:active{transform:translateY(0)}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--tx2)}
.auth-switch a{color:var(--a2);cursor:pointer;font-weight:600;transition:var(--transition)}
.auth-switch a:hover{color:var(--a);text-decoration:underline}
.auth-err{color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none;padding:10px;background:var(--red2);border-radius:var(--radius-xs)}

/* APP LAYOUT */
.app{display:none;height:100vh}
.app.active{display:flex}
.sidebar{width:340px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px}
.sidebar-actions{display:flex;gap:8px}
.sidebar-actions button{width:38px;height:38px;border-radius:var(--radius-xs);background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.sidebar-actions button:hover{background:var(--a);color:#fff;border-color:var(--a);transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,92,231,0.3)}

.search-box{padding:14px 18px;border-bottom:1px solid var(--bd)}
.search-box input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--radius-sm);color:#fff;font-size:13px;transition:var(--transition)}
.search-box input:hover{border-color:var(--bd2)}
.search-box input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a3)}
.search-box input::placeholder{color:var(--tx4)}

.tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 18px}
.tab{flex:1;padding:14px;text-align:center;font-size:12px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition);position:relative}
.tab:hover{color:var(--tx2)}
.tab.active{color:var(--a2)}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:1px}

.users-list{flex:1;overflow-y:auto;padding:10px}
.users-list::-webkit-scrollbar{width:4px}
.users-list::-webkit-scrollbar-track{background:transparent}
.users-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

.user-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);margin-bottom:4px;position:relative}
.user-item:hover{background:var(--bg3)}
.user-item.active{background:var(--a3);border:1px solid rgba(108,92,231,0.2)}
.user-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;position:relative;transition:var(--transition)}
.user-item:hover .user-av{transform:scale(1.05)}
.user-status{position:absolute;bottom:0;right:0;width:14px;height:14px;border-radius:50%;border:2.5px solid var(--bg2);transition:var(--transition)}
.user-item.active .user-status{border-color:rgba(108,92,231,0.2)}
.user-status.online{background:var(--green);box-shadow:0 0 8px rgba(81,207,102,0.5)}
.user-status.offline{background:var(--tx4)}
.user-info{flex:1;min-width:0}
.user-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.user-last{font-size:12px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-time{font-size:10px;color:var(--tx4);flex-shrink:0;margin-top:2px}
.user-badge{min-width:22px;height:22px;background:linear-gradient(135deg,var(--a),var(--a2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;padding:0 7px;box-shadow:0 2px 8px rgba(108,92,231,0.4)}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg);position:relative}
.chat-area::before{content:'';position:absolute;top:0;left:0;right:0;height:200px;background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,0.04) 0%,transparent 70%);pointer-events:none}
.chat-header{padding:16px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:14px;background:rgba(14,14,26,0.6);backdrop-filter:blur(12px);position:relative;z-index:1}
.chat-header-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;transition:var(--transition)}
.chat-header-av:hover{transform:scale(1.05)}
.chat-header-info{flex:1}
.chat-header-name{font-size:16px;font-weight:700}
.chat-header-status{font-size:12px;color:var(--green);font-weight:500}
.chat-header-status.off{color:var(--tx3)}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.msg-date{text-align:center;font-size:11px;color:var(--tx4);padding:16px 0 8px;font-weight:500}
.msg-date span{background:var(--bg3);padding:6px 14px;border-radius:20px;border:1px solid var(--bd)}
.msg{max-width:65%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.55;position:relative;animation:msgIn .3s cubic-bezier(0.4,0,0.2,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.in{align-self:flex-start;background:var(--bg3);border-bottom-left-radius:6px;border:1px solid var(--bd)}
.msg.out{align-self:flex-end;background:linear-gradient(135deg,var(--a),#7c6cf0);border-bottom-right-radius:6px;box-shadow:0 4px 16px rgba(108,92,231,0.3)}
.msg:hover{transform:translateY(-1px)}
.msg-time{font-size:10px;color:rgba(255,255,255,0.45);margin-top:6px;text-align:right}
.msg.in .msg-time{color:var(--tx4)}
.msg-sender{font-size:11px;font-weight:700;margin-bottom:4px;letter-spacing:0.3px}
.chat-input{padding:16px 24px;border-top:1px solid var(--bd);display:flex;gap:12px;align-items:flex-end;background:rgba(14,14,26,0.6);backdrop-filter:blur(12px);position:relative;z-index:1}
.chat-input textarea{flex:1;padding:12px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--radius);color:#fff;font-size:14px;resize:none;max-height:100px;min-height:46px;transition:var(--transition);line-height:1.5}
.chat-input textarea:hover{border-color:var(--bd2)}
.chat-input textarea:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a3)}
.chat-input textarea::placeholder{color:var(--tx4)}
.chat-input button{width:46px;height:46px;border-radius:var(--radius);background:linear-gradient(135deg,var(--a),var(--a2));border:none;color:#fff;font-size:18px;flex-shrink:0;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.chat-input button:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(108,92,231,0.4)}
.chat-input button:active{transform:scale(0.95)}

.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--tx3)}
.empty-chat .icon{font-size:72px;margin-bottom:20px;filter:grayscale(0.3);transition:var(--transition)}
.empty-chat:hover .icon{transform:scale(1.1);filter:grayscale(0)}
.empty-chat p{font-size:16px;font-weight:500}

/* GROUP CHAT */
.group-av{background:linear-gradient(135deg,var(--gr),#0090FF)}

/* PROFILE MODAL */
#profile-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;backdrop-filter:blur(8px);align-items:center;justify-content:center;animation:fadeIn .2s ease}
#profile-modal.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.prof-box{background:rgba(14,14,26,0.95);backdrop-filter:blur(20px);border-radius:24px;padding:36px;width:380px;border:1px solid var(--bd2);text-align:center;box-shadow:var(--shadow-lg);animation:modalIn .3s cubic-bezier(0.4,0,0.2,1)}
@keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.prof-box .close{float:right;background:var(--bg3);border:1px solid var(--bd);width:34px;height:34px;border-radius:var(--radius-xs);color:var(--tx2);font-size:14px;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.prof-box .close:hover{background:var(--red2);color:var(--red);border-color:rgba(255,107,107,0.3)}
.prof-av{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;margin:0 auto 16px;transition:var(--transition);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.prof-av:hover{transform:scale(1.05)}
.prof-name{font-size:20px;font-weight:700;margin-bottom:4px}
.prof-id{font-size:13px;color:var(--tx3);margin-bottom:20px}
.prof-edit{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--radius-xs);color:#fff;font-size:14px;margin-bottom:10px;transition:var(--transition)}
.prof-edit:hover{border-color:var(--bd2)}
.prof-edit:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a3)}
.prof-save{width:100%;padding:13px;background:linear-gradient(135deg,var(--a),#7c6cf0);border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:700;transition:var(--transition)}
.prof-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,92,231,0.4)}
.prof-logout{width:100%;padding:13px;background:transparent;border:1px solid rgba(255,107,107,0.3);border-radius:var(--radius-sm);color:var(--red);font-size:14px;font-weight:600;margin-top:10px;transition:var(--transition)}
.prof-logout:hover{background:var(--red2);border-color:var(--red)}

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--tx4)}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.typing{animation:pulse 1.5s infinite}

/* MOBILE */
@media(max-width:768px){
  .sidebar{width:100%}
  .chat-area{display:none}
  .chat-area.active{display:flex;position:fixed;inset:0;z-index:50}
  .sidebar.hidden{display:none}
  .auth-box{padding:32px 24px;margin:10px}
  .msg{max-width:85%}
  .prof-box{width:calc(100% - 40px);margin:20px}
}

/* FOCUS VISIBLE */
:focus-visible{outline:2px solid var(--a);outline-offset:2px}

/* SELECTION */
::selection{background:var(--a3);color:var(--tx)}
</style>
</head>
<body>

<!-- AUTH: LOGIN -->
<div class="auth" id="auth-login">
  <div class="auth-box">
    <div class="auth-logo">SFERA</div>
    <div class="auth-sub">Войди в свой аккаунт</div>
    <div class="field"><label>Логин</label><input id="login-login" placeholder="Твой логин"></div>
    <div class="field"><label>Пароль</label><input id="login-pass" type="password" placeholder="Твой пароль"></div>
    <button class="auth-btn" onclick="doLogin()">Войти</button>
    <div class="auth-switch">Нет аккаунта? <a onclick="showAuth('reg')">Зарегистрироваться</a></div>
    <div class="auth-err" id="login-err"></div>
  </div>
</div>

<!-- AUTH: REGISTER -->
<div class="auth" id="auth-reg" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">SFERA</div>
    <div class="auth-sub">Создай новый аккаунт</div>
    <div class="field"><label>Имя</label><input id="reg-name" placeholder="Как тебя зовут?"></div>
    <div class="field"><label>Логин</label><input id="reg-login" placeholder="Придумай логин"></div>
    <div class="field"><label>Пароль</label><input id="reg-pass" type="password" placeholder="Придумай пароль"></div>
    <button class="auth-btn" onclick="doRegister()">Зарегистрироваться</button>
    <div class="auth-switch">Уже есть аккаунт? <a onclick="showAuth('login')">Войти</a></div>
    <div class="auth-err" id="reg-err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">SFERA</span>
      <div class="sidebar-actions">
        <button onclick="openProf()" title="Профиль">👤</button>
        <button onclick="createGroup()" title="Новый чат">✏️</button>
      </div>
    </div>
    <div class="search-box"><input placeholder="Поиск пользователей..." oninput="filterUsers(this.value)"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('chats',this)">Чаты</div>
      <div class="tab" onclick="switchTab('users',this)">Люди</div>
    </div>
    <div class="users-list" id="users-list"></div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="empty-chat" id="empty-chat">
      <div class="icon">💬</div>
      <p>Выбери чат или начни новый</p>
    </div>
    <div id="chat-active" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header" id="chat-header"></div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input">
        <textarea id="msg-input" rows="1" placeholder="Напиши сообщение..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profile-modal">
  <div class="prof-box">
    <button class="close" onclick="closeProf()">✕</button>
    <div class="prof-av" id="prof-av"></div>
    <div class="prof-name" id="prof-name"></div>
    <div class="prof-id" id="prof-id"></div>
    <input class="prof-edit" id="prof-name-edit" placeholder="Новое имя">
    <button class="prof-save" onclick="saveProf()">Сохранить</button>
    <button class="prof-logout" onclick="logout()">Выйти</button>
  </div>
</div>

<script>
// ===== DATA =====
var DB_KEY = 'sfera_db';
var SESSION_KEY = 'sfera_session';
var db = JSON.parse(localStorage.getItem(DB_KEY) || 'null') || { users: [], chats: [], nextChatId: 1 };
function saveDB(){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }

// Pre-create system accounts
if(!db.users.find(function(u){return u.login==='system'})){
  db.users.push({id:'system',name:'Sfera Bot',login:'system',pass:'',color:'#6C5CE7',online:false,lastSeen:Date.now()});
  db.users.push({id:'admin',name:'Админ',login:'admin',pass:'admin',color:'#ff6b6b',online:false,lastSeen:Date.now()});
  db.users.push({id:'demo1',name:'Алексей',login:'alex',pass:'1234',color:'#00d2d3',online:false,lastSeen:Date.now()});
  db.users.push({id:'demo2',name:'Мария',login:'masha',pass:'1234',color:'#ff9ff3',online:false,lastSeen:Date.now()});
  db.users.push({id:'demo3',name:'Дмитрий',login:'dima',pass:'1234',color:'#feca57',online:false,lastSeen:Date.now()});
  saveDB();
}

var currentUser = null;
var currentChat = null;
var currentTab = 'chats';
var bc = null;
try { bc = new BroadcastChannel('sfera_channel'); } catch(e){}

// ===== AUTH =====
function showAuth(view){
  document.getElementById('auth-login').style.display = view==='login'?'flex':'none';
  document.getElementById('auth-reg').style.display = view==='reg'?'flex':'none';
}
function showErr(id,msg){ var el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
function hideErr(id){ document.getElementById(id).style.display='none'; }

function doLogin(){
  hideErr('login-err');
  var login = document.getElementById('login-login').value.trim().toLowerCase();
  var pass = document.getElementById('login-pass').value;
  if(!login||!pass){ showErr('login-err','Заполни все поля'); return; }
  var user = db.users.find(function(u){return u.login===login && u.pass===pass;});
  if(!user){ showErr('login-err','Неверный логин или пароль'); return; }
  startApp(user);
}

function doRegister(){
  hideErr('reg-err');
  var name = document.getElementById('reg-name').value.trim();
  var login = document.getElementById('reg-login').value.trim().toLowerCase();
  var pass = document.getElementById('reg-pass').value;
  if(!name||!login||!pass){ showErr('reg-err','Заполни все поля'); return; }
  if(login.length<3){ showErr('reg-err','Логин минимум 3 символа'); return; }
  if(pass.length<4){ showErr('reg-err','Пароль минимум 4 символа'); return; }
  if(db.users.find(function(u){return u.login===login;})){ showErr('reg-err','Логин уже занят'); return; }
  var colors = ['#6C5CE7','#00d2d3','#ff6b6b','#ff9ff3','#feca57','#51cf66','#ffa502','#70a1ff'];
  var newUser = {
    id: 'u_' + Date.now(),
    name: name,
    login: login,
    pass: pass,
    color: colors[Math.floor(Math.random()*colors.length)],
    online: true,
    lastSeen: Date.now()
  };
  db.users.push(newUser);
  saveDB();
  startApp(newUser);
}

// ===== APP =====
function startApp(user){
  currentUser = user;
  currentUser.online = true;
  currentUser.lastSeen = Date.now();
  saveDB();
  // Save session
  localStorage.setItem(SESSION_KEY, user.id);
  document.querySelector('.auth').style.display = 'none';
  document.getElementById('app').classList.add('active');
  broadcastPresence();
  renderList();
  startHeartbeat();
  // Create default group chat
  if(!db.chats.find(function(c){return c.type==='group';})){
    db.chats.push({id:'group',type:'group',name:'Общий чат',members:['system','admin','demo1','demo2','demo3'],messages:[
      {from:'system',text:'Добро пожаловать в общий чат Sfera! 🎉',time:Date.now()-100000},
      {from:'demo1',text:'Привет всем! Как дела?',time:Date.now()-80000},
      {from:'demo2',text:'Привет! Всё отлично 😊',time:Date.now()-60000},
      {from:'demo3',text:'Добро пожаловать новичкам!',time:Date.now()-40000}
    ]});
    saveDB();
  }
}

function logout(){
  currentUser.online = false;
  currentUser.lastSeen = Date.now();
  saveDB();
  broadcastPresence();
  currentUser = null;
  currentChat = null;
  // Clear session
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('app').classList.remove('active');
  document.getElementById('auth-login').style.display = 'flex';
  document.getElementById('auth-reg').style.display = 'none';
  document.getElementById('login-login').value = '';
  document.getElementById('login-pass').value = '';
  closeProf();
}

// ===== BROADCAST =====
function broadcastPresence(){
  if(!bc) return;
  bc.postMessage({type:'presence',userId:currentUser.id,online:currentUser.online,name:currentUser.name});
}
function broadcastMsg(chatId,msg){
  if(!bc) return;
  bc.postMessage({type:'message',chatId:chatId,msg:msg});
}
if(bc){
  bc.onmessage = function(e){
    var d = e.data;
    if(d.type==='presence'){
      var u = db.users.find(function(x){return x.id===d.userId;});
      if(u){ u.online = d.online; u.lastSeen = Date.now(); saveDB(); renderList(); updateChatHeader(); }
    }
    if(d.type==='message' && d.chatId && currentChat && currentChat.id===d.chatId){
      var chat = db.chats.find(function(c){return c.id===d.chatId;});
      if(chat && !chat.messages.find(function(m){return m.time===d.msg.time && m.from===d.msg.from;})){
        chat.messages.push(d.msg);
        saveDB();
        renderMessages();
      }
    }
  };
}

// ===== HEARTBEAT =====
function startHeartbeat(){
  setInterval(function(){
    if(!currentUser) return;
    currentUser.lastSeen = Date.now();
    currentUser.online = true;
    saveDB();
    broadcastPresence();
    renderList();
  }, 15000);
  setInterval(function(){
    db.users.forEach(function(u){
      if(u.id!==currentUser.id && Date.now()-u.lastSeen>30000) u.online=false;
    });
    saveDB();
    renderList();
  }, 20000);
}

// ===== RENDER LIST =====
function renderList(){
  var list = document.getElementById('users-list');
  var html = '';
  if(currentTab==='chats'){
    var chats = db.chats.filter(function(c){
      if(c.type==='group') return true;
      return c.members.indexOf(currentUser.id)>=0;
    });
    chats.sort(function(a,b){
      var aL = a.messages.length ? a.messages[a.messages.length-1].time : 0;
      var bL = b.messages.length ? b.messages[b.messages.length-1].time : 0;
      return bL-aL;
    });
    chats.forEach(function(c){
      var last = c.messages.length ? c.messages[c.messages.length-1] : null;
      var lastText = last ? (last.from===currentUser.id?'Ты: ':'') + last.text : 'Нет сообщений';
      var lastTime = last ? timeShort(last.time) : '';
      var isActive = currentChat && currentChat.id===c.id;
      if(c.type==='group'){
        html += '<div class="user-item'+(isActive?' active':'')+'" onclick="openChat(\''+c.id+'\')">';
        html += '<div class="user-av group-av">📢</div>';
        html += '<div class="user-info"><div class="user-name">'+c.name+'</div><div class="user-last">'+esc(lastText)+'</div></div>';
        html += '<div class="user-time">'+lastTime+'</div></div>';
      } else {
        var otherId = c.members[0]===currentUser.id ? c.members[1] : c.members[0];
        var other = db.users.find(function(u){return u.id===otherId;});
        if(!other) return;
        html += '<div class="user-item'+(isActive?' active':'')+'" onclick="openChat(\''+c.id+'\')">';
        html += '<div class="user-av" style="background:'+other.color+'">'+initials(other.name)+'<div class="user-status '+(other.online?'online':'offline')+'"></div></div>';
        html += '<div class="user-info"><div class="user-name">'+esc(other.name)+'</div><div class="user-last">'+esc(lastText)+'</div></div>';
        html += '<div class="user-time">'+lastTime+'</div></div>';
      }
    });
    if(!chats.length) html='<div style="text-align:center;padding:40px 20px;color:var(--tx3)"><div style="font-size:36px;margin-bottom:10px">📭</div>Пока нет чатов</div>';
  } else {
    var users = db.users.filter(function(u){return u.id!==currentUser.id;});
    users.sort(function(a,b){return (b.online?1:0)-(a.online?1:0);});
    users.forEach(function(u){
      var lastSeenText = u.online ? 'В сети' : 'Был(а) '+timeAgo(u.lastSeen);
      html += '<div class="user-item" onclick="openDM(\''+u.id+'\')">';
      html += '<div class="user-av" style="background:'+u.color+'">'+initials(u.name)+'<div class="user-status '+(u.online?'online':'offline')+'"></div></div>';
      html += '<div class="user-info"><div class="user-name">'+esc(u.name)+'</div><div class="user-last">@'+u.login+' · '+lastSeenText+'</div></div></div>';
    });
  }
  list.innerHTML = html;
}

function filterUsers(q){
  q = q.toLowerCase();
  document.querySelectorAll('.user-item').forEach(function(el){
    el.style.display = el.textContent.toLowerCase().indexOf(q)>=0 ? '' : 'none';
  });
}

function switchTab(tab,el){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  renderList();
}

// ===== CHAT =====
function openChat(chatId){
  var chat = db.chats.find(function(c){return c.id===chatId;});
  if(!chat) return;
  currentChat = chat;
  document.getElementById('empty-chat').style.display = 'none';
  document.getElementById('chat-active').style.display = 'flex';
  updateChatHeader();
  renderMessages();
  renderList();
  // Auto-reply from bots
  if(chat.type==='group' && chat.messages.length>0){
    var last = chat.messages[chat.messages.length-1];
    if(last.from!==currentUser.id && last.from!=='system'){
      setTimeout(function(){ autoReply(chat); },2000+Math.random()*3000);
    }
  }
}

function openDM(userId){
  var chatId = [currentUser.id, userId].sort().join('_');
  var chat = db.chats.find(function(c){return c.id===chatId;});
  if(!chat){
    chat = {id:chatId,type:'dm',members:[currentUser.id,userId],messages:[]};
    db.chats.push(chat);
    saveDB();
  }
  openChat(chatId);
}

function createGroup(){
  var name = prompt('Название нового чата:');
  if(!name) return;
  var chatId = 'group_'+Date.now();
  db.chats.push({id:chatId,type:'group',name:name,members:[currentUser.id],messages:[
    {from:'system',text:'Чат создан!',time:Date.now()}
  ]});
  saveDB();
  openChat(chatId);
}

function updateChatHeader(){
  var h = document.getElementById('chat-header');
  if(!currentChat) return;
  if(currentChat.type==='group'){
    h.innerHTML = '<div class="chat-header-av group-av">📢</div><div class="chat-header-info"><div class="chat-header-name">'+esc(currentChat.name)+'</div><div class="chat-header-status">'+currentChat.members.length+' участников</div></div>';
  } else {
    var otherId = currentChat.members[0]===currentUser.id ? currentChat.members[1] : currentChat[0];
    var other = db.users.find(function(u){return u.id===otherId;});
    if(!other) return;
    h.innerHTML = '<div class="chat-header-av" style="background:'+other.color+'">'+initials(other.name)+'</div><div class="chat-header-info"><div class="chat-header-name">'+esc(other.name)+'</div><div class="chat-header-status'+(other.online?'':' off')+'">'+(other.online?'В сети':'Не в сети')+'</div></div>';
  }
}

function renderMessages(){
  var box = document.getElementById('chat-messages');
  if(!currentChat) return;
  var html = '';
  var lastDate = '';
  currentChat.messages.forEach(function(m){
    var d = new Date(m.time).toLocaleDateString('ru-RU');
    if(d!==lastDate){ html+='<div class="msg-date"><span>'+d+'</span></div>'; lastDate=d; }
    var isOut = m.from===currentUser.id;
    var sender = db.users.find(function(u){return u.id===m.from;});
    var name = sender ? sender.name : 'Неизвестный';
    var clr = sender ? sender.color : '#555';
    html += '<div class="msg '+(isOut?'out':'in')+'">';
    if(!isOut && currentChat.type==='group') html+='<div class="msg-sender" style="color:'+clr+'">'+esc(name)+'</div>';
    html += esc(m.text);
    html += '<div class="msg-time">'+timeMsg(m.time)+'</div></div>';
  });
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

function sendMsg(){
  var inp = document.getElementById('msg-input');
  var text = inp.value.trim();
  if(!text || !currentChat) return;
  var msg = {from:currentUser.id, text:text, time:Date.now()};
  currentChat.messages.push(msg);
  saveDB();
  inp.value = '';
  renderMessages();
  renderList();
  broadcastMsg(currentChat.id, msg);
  // Auto-reply
  if(currentChat.type==='group'){
    setTimeout(function(){ autoReply(currentChat); },1500+Math.random()*3000);
  }
}

function autoReply(chat){
  if(!chat || !chat.messages.length) return;
  var botIds = chat.members.filter(function(id){return id!==currentUser.id && id!=='system';});
  if(!botIds.length) return;
  var botId = botIds[Math.floor(Math.random()*botIds.length)];
  var bot = db.users.find(function(u){return u.id===botId;});
  if(!bot || !bot.online) return;
  var replies = [
    'Согласен! 👍','Интересно, расскажи больше!','Хаха, точно 😄',
    'Круто!','Не знал об этом','А что думаешь о сервере?',
    'Кто хочет поиграть?','Привет всем! 😊','Отличная новость!',
    'Я тоже так думаю','Надо попробовать!','Кто-нибудь в игре?',
    'Спасибо за инфо!','Класс!','Ого, серьёзно?'
  ];
  var msg = {from:botId, text:replies[Math.floor(Math.random()*replies.length)], time:Date.now()};
  chat.messages.push(msg);
  saveDB();
  if(currentChat && currentChat.id===chat.id) renderMessages();
  renderList();
}

// ===== PROFILE =====
function openProf(){
  document.getElementById('profile-modal').classList.add('show');
  document.getElementById('prof-av').style.background = currentUser.color;
  document.getElementById('prof-av').textContent = initials(currentUser.name);
  document.getElementById('prof-name').textContent = currentUser.name;
  document.getElementById('prof-id').textContent = '@'+currentUser.login;
  document.getElementById('prof-name-edit').value = currentUser.name;
}
function closeProf(){ document.getElementById('profile-modal').classList.remove('show'); }
function saveProf(){
  var n = document.getElementById('prof-name-edit').value.trim();
  if(!n) return;
  currentUser.name = n;
  saveDB();
  renderList();
  updateChatHeader();
  closeProf();
}

// ===== UTILS =====
function initials(name){ return name.split(' ').map(function(w){return w[0]}).join('').substring(0,2).toUpperCase(); }
function esc(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function timeShort(t){ var d=new Date(t),h=d.getHours(),m=d.getMinutes(); return (h<10?'0':'')+h+':'+(m<10?'0':'')+m; }
function timeMsg(t){ var d=new Date(t),h=d.getHours(),m=d.getMinutes(),dd=d.getDate(),mm=d.getMonth()+1; return (dd<10?'0':'')+dd+'.'+(mm<10?'0':'')+mm+' '+(h<10?'0':'')+h+':'+(m<10?'0':'')+m; }
function timeAgo(t){
  var s=Math.floor((Date.now()-t)/1000);
  if(s<60) return 'только что';
  if(s<3600) return Math.floor(s/60)+' мин назад';
  if(s<86400) return Math.floor(s/3600)+' ч назад';
  return Math.floor(s/86400)+' дн назад';
}

// ===== AUTO-LOGIN =====
(function(){
  var savedId = localStorage.getItem(SESSION_KEY);
  if(savedId){
    var user = db.users.find(function(u){return u.id===savedId;});
    if(user){
      startApp(user);
    }
  }
})();
</script>
